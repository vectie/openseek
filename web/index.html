<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenSeek session viewer</title>
  <style>
    /* Light is the default. `data-theme="dark"` forces dark; `data-theme="system"`
       follows the OS via prefers-color-scheme (tracked live, no JS listener). */
    :root,
    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-2: #eef1f5;
      --border: #d7dce3;
      --text: #1c2027;
      --muted: #5b6472;
      --accent: #2563eb;
      --on-accent: #ffffff;
      --user: #2f5bd6;
      --assistant: #1a8f63;
      --tool: #8a6d10;
      --error: #c2334a;
      --runtime: #6d4fb0;
      --summary: #b5701f;
      --terminal: #2b7e9e;
      --summary-bg: #fbf3e6;
      --notice-warn-bg: #fdf3e0;
      --notice-error-bg: #fbe9ec;
      --badge-finished-bg: #dff3e6; --badge-finished-fg: #1a7a45;
      --badge-aborted-bg: #fbeed1; --badge-aborted-fg: #8a6d10;
      --badge-interrupted-bg: #e6e9ef; --badge-interrupted-fg: #4a5263;
      --badge-failed-bg: #fbe0e5; --badge-failed-fg: #b02a43;
    }
    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0f1117;
      --panel: #161922;
      --panel-2: #1d212c;
      --border: #2a2f3a;
      --text: #d7dbe4;
      --muted: #8a92a4;
      --accent: #6ea8fe;
      --on-accent: #0b0d12;
      --user: #6f93ff;
      --assistant: #36c08a;
      --tool: #c9a227;
      --error: #e0556b;
      --runtime: #9a7bd6;
      --summary: #d98a3a;
      --terminal: #5fa8c7;
      --summary-bg: #1c1812;
      --notice-warn-bg: #3a2f12;
      --notice-error-bg: #3a1620;
      --badge-finished-bg: #14361f; --badge-finished-fg: #5fd08a;
      --badge-aborted-bg: #3a2f12; --badge-aborted-fg: #e0b257;
      --badge-interrupted-bg: #2a2f3a; --badge-interrupted-fg: #9fb0c9;
      --badge-failed-bg: #3a1620; --badge-failed-fg: #ef8098;
    }
    @media (prefers-color-scheme: dark) {
      :root[data-theme="system"] {
        color-scheme: dark;
        --bg: #0f1117;
        --panel: #161922;
        --panel-2: #1d212c;
        --border: #2a2f3a;
        --text: #d7dbe4;
        --muted: #8a92a4;
        --accent: #6ea8fe;
        --on-accent: #0b0d12;
        --user: #6f93ff;
        --assistant: #36c08a;
        --tool: #c9a227;
        --error: #e0556b;
        --runtime: #9a7bd6;
        --summary: #d98a3a;
        --terminal: #5fa8c7;
        --summary-bg: #1c1812;
        --notice-warn-bg: #3a2f12;
        --notice-error-bg: #3a1620;
        --badge-finished-bg: #14361f; --badge-finished-fg: #5fd08a;
        --badge-aborted-bg: #3a2f12; --badge-aborted-fg: #e0b257;
        --badge-interrupted-bg: #2a2f3a; --badge-interrupted-fg: #9fb0c9;
        --badge-failed-bg: #3a1620; --badge-failed-fg: #ef8098;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background .15s ease, color .15s ease;
    }
    .app { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
    .app.sidebar-hidden { grid-template-columns: minmax(0, 1fr); }

    /* sidebar: fixed head, scrolling list, pinned theme footer */
    .sidebar {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--panel);
      overflow: hidden;
    }
    .sidebar-head { padding: 16px 16px 8px; }
    .sidebar-title-row { display: flex; align-items: center; gap: 8px; }
    .brand { font-size: 15px; margin: 0 0 4px; letter-spacing: .2px; }
    .status { color: var(--muted); font-size: 12px; }
    .sidebar-hide-button,
    .sidebar-show-button {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 7px;
      cursor: pointer;
      font-size: 12px;
      line-height: 1.2;
    }
    .sidebar-hide-button {
      margin-left: auto;
      padding: 4px 9px;
    }
    .sidebar-show-button { padding: 6px 12px; }
    .sidebar-hide-button:hover,
    .sidebar-show-button:hover { border-color: var(--accent); }
    .sidebar-empty { padding: 8px 16px; color: var(--muted); font-style: italic; }
    .session-list { flex: 1 1 auto; overflow-y: auto; margin: 0; padding: 8px 12px; }
    .session-root { margin-bottom: 10px; }
    .session-root-toggle {
      width: 100%;
      display: grid;
      grid-template-columns: 14px minmax(0, 1fr) auto;
      align-items: center;
      gap: 6px;
      padding: 6px 4px 5px;
      background: transparent;
      border: 0;
      color: var(--muted);
      font-size: 11px;
      font-family: ui-monospace, monospace;
      cursor: pointer;
      text-align: left;
    }
    .session-root-toggle:hover { color: var(--text); }
    .session-root-caret {
      text-align: center;
      font-size: 10px;
    }
    .session-root-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .session-root-count {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0 6px;
      font-size: 10px;
    }
    .session-root-sessions {
      list-style: none;
      margin: 0;
      padding: 0 0 0 10px;
      border-left: 1px solid var(--border);
    }
    .session-item {
      padding: 9px 10px;
      border: 1px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 4px;
    }
    .session-item:hover { background: var(--panel-2); }
    .session-item.selected { background: var(--panel-2); border-color: var(--accent); }
    .session-item-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-item-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
      font-family: ui-monospace, monospace;
    }
    .session-item-id { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-item-time { flex: 0 0 auto; }

    /* theme switcher */
    .theme-toggle { display: flex; gap: 6px; padding: 10px 14px; border-top: 1px solid var(--border); }
    .theme-button {
      flex: 1;
      background: var(--panel); color: var(--text);
      border: 1px solid var(--border); border-radius: 7px;
      padding: 5px 0; cursor: pointer; font-size: 12px;
    }
    .theme-button:hover { border-color: var(--accent); }
    .theme-button.active { background: var(--accent); color: var(--on-accent); border-color: var(--accent); }

    /* main: no top padding on the scroll container itself, so the sticky toolbar
       can pin flush to the very top. The 20px top breathing room moves onto the
       content (.session-view / .main-toolbar) where it scrolls away normally. */
    .main { overflow-y: auto; padding: 0 28px; }
    .session-view { padding-top: 20px; }
    .main-toolbar {
      min-height: 34px;
      padding-top: 20px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: 6px;
    }
    .placeholder { color: var(--muted); margin-top: 40px; text-align: center; }
    .header-strip {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }
    .header-id { font-family: ui-monospace, monospace; font-size: 16px; }
    .header-meta { color: var(--muted); font-size: 12px; }

    /* mode toggle */
    /* sticky toolbar: keeps the view/args toggles + error bar pinned to the top
       of the scrolling .main while reading a long log. Negative side margins let
       its background span the .main padding gutter so content can't peek beside it. */
    .sticky-toolbar {
      position: sticky;
      top: 0;
      z-index: 5;
      background: var(--bg);
      margin: 0 -28px 16px;
      padding: 12px 28px;
      border-bottom: 1px solid var(--border);
    }
    .sticky-toolbar .mode-row { margin-bottom: 0; }
    .sticky-toolbar .error-bar { margin: 10px 0 0; }
    .mode-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px 14px;
      margin-bottom: 16px;
    }
    .mode-cluster { display: flex; align-items: center; flex-wrap: wrap; gap: 8px 16px; }
    .mode-toggle { display: flex; align-items: center; gap: 8px; }
    .args-toggle-label { color: var(--muted); font-size: 12px; margin-right: 2px; }
    .mode-button {
      background: var(--panel); color: var(--text);
      border: 1px solid var(--border); border-radius: 999px;
      padding: 5px 14px; cursor: pointer; font-size: 13px;
    }
    .mode-button:hover { border-color: var(--accent); }
    .mode-button.active { background: var(--accent); color: var(--on-accent); border-color: var(--accent); }
    .session-metadata {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px 10px;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
    }
    .session-metadata span {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px 8px;
      background: var(--panel);
      white-space: nowrap;
    }

    /* find-failures bar */
    .error-bar { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin: -6px 0 16px; }
    .error-count { color: var(--error); font-size: 12px; font-weight: 600; margin-right: 2px; }
    .error-toggle, .error-jump {
      background: var(--panel); color: var(--text);
      border: 1px solid var(--border); border-radius: 999px;
      padding: 4px 12px; cursor: pointer; font-size: 12px;
    }
    .error-jump { padding: 4px 11px; font-family: ui-monospace, monospace; }
    .error-toggle:hover, .error-jump:hover { border-color: var(--error); }
    .error-toggle.active { background: var(--error); color: #fff; border-color: var(--error); }
    .turn-error-badge { color: var(--error); }
    .errors-only-empty { color: var(--muted); margin-top: 24px; }
    /* errors-only: keep failed tool-result cards AND the assistant card holding the
       failing call (so the call and its result stay as two cells), plus the turns
       containing an error; hide everything else. */
    .session-view.errors-only .card:not(.error):not(.assistant) { display: none; }
    .session-view.errors-only .card.assistant:not(:has(.tool-call-failed)) { display: none; }
    .session-view.errors-only .turn:not(:has(.card.error)) { display: none; }

    /* notices */
    .notices { margin-bottom: 16px; }
    .notice { border-radius: 8px; padding: 8px 12px; margin-bottom: 8px; font-size: 13px; }
    .notice-warn { background: var(--notice-warn-bg); border: 1px solid var(--summary); }
    .notice-error { background: var(--notice-error-bg); border: 1px solid var(--error); }
    .notice-head { font-weight: 600; }
    .notice-body { margin: 6px 0 0; font-size: 12px; opacity: .85; white-space: pre-wrap; }

    /* turns + cards */
    .turn { margin-bottom: 14px; }
    .turn-summary {
      cursor: pointer; color: var(--muted); font-size: 12px;
      text-transform: uppercase; letter-spacing: .5px; padding: 4px 0;
    }
    .turn-body { padding-left: 4px; }
    .card {
      border: 1px solid var(--border);
      border-left-width: 3px;
      border-radius: 8px;
      background: var(--panel);
      padding: 10px 14px;
      margin: 8px 0;
    }
    .card.user { border-left-color: var(--user); }
    .card.assistant { border-left-color: var(--assistant); }
    .card.tool { border-left-color: var(--tool); }
    .card.tool.error { border-left-color: var(--error); background: var(--notice-error-bg); }
    .card.runtime { border-left-color: var(--runtime); }
    .card.summary { border-left-color: var(--summary); background: var(--summary-bg); }
    .card.terminal { border-left-color: var(--terminal); }
    .card.system { border-left-color: var(--muted); }
    .card-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: .6px;
      color: var(--muted); margin-bottom: 6px; cursor: default;
    }
    .card-seq { font-family: ui-monospace, monospace; margin-right: 8px; opacity: .7; }
    .card-step {
      font-family: ui-monospace, monospace;
      margin-left: 8px;
      opacity: .75;
      text-transform: none;
      letter-spacing: 0;
    }
    .card-ts { font-family: ui-monospace, monospace; margin-left: 8px; opacity: .55; font-weight: normal; }
    .content {
      margin: 0; white-space: pre-wrap; word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px;
    }
    .empty { color: var(--muted); font-style: italic; }

    /* assistant reasoning + tool calls */
    .reasoning { margin: 0 0 8px; }
    .reasoning > summary { cursor: pointer; color: var(--muted); font-size: 12px; }
    .reasoning .content { color: var(--muted); }
    .tool-calls { margin-top: 8px; }
    .tool-call { border: 1px dashed var(--border); border-radius: 6px; padding: 6px 10px; margin-top: 6px; }
    .tool-call-name { font-size: 13px; }
    .tool-call-brief { color: var(--muted); font-family: ui-monospace, monospace; font-size: 12px; }
    details.tool-call > summary.tool-call-name { cursor: pointer; }
    details.tool-call[open] > summary.tool-call-name { margin-bottom: 4px; }
    .tool-call-args { margin: 0; white-space: pre-wrap; font-family: ui-monospace, monospace; font-size: 12px; color: var(--muted); }

    /* friendly tool-args: one key: value row per field, values shown verbatim */
    .tool-call-args-rendered { margin: 0; font-size: 12px; }
    .arg-field { margin: 3px 0; }
    .arg-key { color: var(--accent); font-family: ui-monospace, monospace; font-size: 12px; font-weight: 600; }
    .arg-key::after { content: ": "; color: var(--muted); font-weight: 400; }
    .arg-value-inline { font-family: ui-monospace, monospace; font-size: 12px; white-space: pre-wrap; word-break: break-word; }
    .arg-value {
      margin: 3px 0 0; padding: 6px 8px;
      background: var(--panel-2); border: 1px solid var(--border); border-radius: 4px;
      white-space: pre-wrap; word-break: break-word;
      font-family: ui-monospace, monospace; font-size: 12px;
    }
    /* tool-args toggle: friendly form by default, raw JSON under .show-original */
    .tool-call-args-original { display: none; }
    .session-view.show-original .tool-call-args-original { display: block; }
    .session-view.show-original .tool-call-args-rendered { display: none; }

    /* a tool call whose result failed: tint its border so it stands out, and let
       errors-only keep the assistant card that holds it. */
    .tool-call-failed { border-color: var(--error); }

    /* folded tool-result cards: the label is the toggle, body hides until clicked */
    details.card > summary.card-label { cursor: pointer; }
    details.card > summary.card-label:hover { color: var(--text); }
    .tool-flag {
      color: var(--error); font-weight: 700; margin-right: 8px;
      text-transform: none; letter-spacing: 0;
    }

    /* badges */
    .badge {
      display: inline-block; padding: 2px 9px; border-radius: 999px;
      font-size: 11px; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px;
    }
    .badge-finished { background: var(--badge-finished-bg); color: var(--badge-finished-fg); }
    .badge-aborted { background: var(--badge-aborted-bg); color: var(--badge-aborted-fg); }
    .badge-interrupted { background: var(--badge-interrupted-bg); color: var(--badge-interrupted-fg); }
    .badge-failed { background: var(--badge-failed-bg); color: var(--badge-failed-fg); }

    .empty-state { color: var(--muted); margin-top: 24px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="/viz_app.js"></script>
</body>
</html>
