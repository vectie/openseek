<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenSeek Desktop</title>
    <!-- The embedded code viewer's styles, assembled from the editor submodule
         by the packager (see build_viewer_stylesheet). -->
    <link rel="stylesheet" href="viewer.css" />
    <style>
      /* Geist Mono is bundled (fonts/, SIL OFL 1.1) rather than fetched from
         Google Fonts, so the app renders identically offline. The variable
         file covers every weight the UI uses. */
      @font-face {
        font-family: "Geist Mono";
        src: url("fonts/GeistMono-Variable.woff2") format("woff2");
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
      }

      /* openseek — calm, minimal, all-mono coding agent.
         Light mode primary, warm paper surfaces, hairline borders, blue accent. */
      :root {
        color-scheme: light dark;

        --mono: "Geist Mono", "SF Mono", ui-monospace, "Cascadia Mono", Menlo,
          Consolas, monospace;

        --paper: #fbfbf9;
        --surface: #ffffff;
        --surface-2: #f6f6f3;
        --ink: #16171a;
        --ink-2: #5c5f66;
        --ink-3: #9a9da4;
        --line: #e9e8e3;
        --line-2: #f0efea;

        --accent: #3b6ef5;
        --accent-ink: #2a55cc;
        --accent-soft: #eef2fe;
        --accent-line: #d6e0fd;

        --add: #1f8a5b;
        --add-bg: #eaf6ef;
        --add-line: #cdead9;
        --del: #c0453b;
        --del-bg: #fcefed;
        --del-line: #f2d4cf;
        --warn: #b7791f;
        --tool: #7a5af0;
        --tool-bg: #f1eefe;
        --tool-line: #e6e0fb;

        --code: #2b2f36;

        --radius: 9px;
        --radius-sm: 6px;
        --radius-lg: 14px;
        --shadow: 0 1px 2px rgba(20, 23, 26, 0.04),
          0 6px 22px -10px rgba(20, 23, 26, 0.1);
        --shadow-pop: 0 8px 30px -8px rgba(20, 23, 26, 0.22);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --paper: #16181d;
          --surface: #1c1f26;
          --surface-2: #23272f;
          --ink: #e9ebf0;
          --ink-2: #a3a8b4;
          --ink-3: #6f7480;
          --line: #2c313b;
          --line-2: #262b33;

          --accent: #5b8cff;
          --accent-ink: #9db8ff;
          --accent-soft: #1e2740;
          --accent-line: #2f3e63;

          --add: #3fd089;
          --add-bg: #16271f;
          --add-line: #244534;
          --del: #ff8a80;
          --del-bg: #2a1b1b;
          --del-line: #4a2f2f;
          --warn: #e3b341;
          --tool: #b39bff;
          --tool-bg: #221f33;
          --tool-line: #322c4a;

          --code: #d7dbe2;

          --shadow: 0 1px 2px rgba(0, 0, 0, 0.3),
            0 6px 22px -10px rgba(0, 0, 0, 0.5);
          --shadow-pop: 0 8px 30px -8px rgba(0, 0, 0, 0.6);
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #app {
        margin: 0;
        width: 100%;
        height: 100%;
        /* The app shell never scrolls as a whole; scrolling is delegated to
           the inner panes. Without this, any sub-pixel overflow bubbles to the
           body and shows redundant window-level scrollbars. */
        overflow: hidden;
      }

      body {
        background: var(--paper);
        color: var(--ink);
        font-family: var(--mono);
        font-size: 13.5px;
        line-height: 1.55;
        letter-spacing: -0.01em;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      ::selection {
        background: var(--accent-soft);
      }

      /* quiet scrollbars */
      ::-webkit-scrollbar {
        width: 9px;
        height: 9px;
      }
      ::-webkit-scrollbar-thumb {
        background: color-mix(in srgb, var(--ink) 14%, transparent);
        border-radius: 99px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: color-mix(in srgb, var(--ink) 26%, transparent);
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }

      /* Inline SVG icons (vscode-codicons); they take the surrounding
         control's color via currentColor and size per context below. */
      .icon {
        display: inline-flex;
        flex: none;
        width: 16px;
        height: 16px;
      }
      .icon svg {
        width: 100%;
        height: 100%;
      }
      .sidebar-icon .icon,
      .composer-notice-icon .icon {
        width: 14px;
        height: 14px;
      }
      .topbar-toggle .icon,
      .panel-toggle .icon,
      .icon-button .icon,
      .jump-latest .icon {
        width: 15px;
        height: 15px;
      }
      .launcher-glyph .icon,
      .row-archive .icon {
        width: 13px;
        height: 13px;
      }
      .mention-remove .icon {
        width: 12px;
        height: 12px;
      }
      .launcher-caret .icon {
        width: 9px;
        height: 9px;
      }

      @keyframes pulseDot {
        0% {
          box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 45%, transparent);
        }
        70% {
          box-shadow: 0 0 0 6px transparent;
        }
        100% {
          box-shadow: 0 0 0 0 transparent;
        }
      }
      @keyframes riseIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      .app {
        display: grid;
        grid-template-columns: minmax(220px, 264px) minmax(0, 1fr);
        /* Track #app's content box (which already accounts for any scrollbar)
           rather than 100vh, so the two height bases can't disagree. */
        height: 100%;
        min-height: 0;
      }

      /* Collapsed: the sidebar column folds to zero and the conversation
         takes the full width. The aside stays in the DOM (merely unmounted
         from layout) so reopening keeps its scroll position. */
      .app.sidebar-collapsed {
        grid-template-columns: minmax(0, 1fr);
      }
      .app.sidebar-collapsed > aside {
        display: none;
      }

      /* The conversation (left) and the editor (right) live side by side as two
         independent parts. The editor track is zero-width until the panel
         opens, so the viewer host element stays in the DOM but takes no
         space. */
      .content {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 0;
        min-width: 0;
        min-height: 0;
      }

      /* Open: the conversation and the editor share the content area. The
         editor's width is `--editor-width`, set as the user drags the handle on
         its left edge (see editor_resize.mbt); it defaults to half and is
         clamped against the content area (`100%`, sidebar excluded) so the
         editor floors at 360px while the conversation keeps at least 240px. The
         clamp also re-fits the panel on window resize without any script. */
      .content.panel-open {
        grid-template-columns:
          minmax(0, 1fr)
          clamp(360px, var(--editor-width, 50%), calc(100% - 240px));
      }

      /* ---------- files panel ---------- */
      /* Topbar icon toggle for the whole right panel, mirroring the left
         sidebar toggle; `active` highlights it while the panel is open. The
         run status's `margin-left: auto` right-aligns it, so it needs no auto
         margin of its own. */
      .panel-toggle {
        display: grid;
        place-items: center;
        width: 28px;
        height: 28px;
        border: 0;
        border-radius: var(--radius-sm);
        background: transparent;
        color: var(--ink-3);
        font-size: 16px;
        line-height: 1;
        cursor: pointer;
      }

      button.panel-toggle:not(:disabled):hover {
        background: var(--surface-2);
        color: var(--ink);
      }

      .panel-toggle.active {
        background: var(--accent-soft);
        color: var(--accent-ink);
      }

      /* The editor part: a tab strip of open files over the viewer, with the
         file tree as a toggleable pane on the viewer's right. */
      .editor {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        border-left: 1px solid var(--line);
        background: var(--surface);
        /* Own stacking context so the opaque editor always paints above the
           conversation column, never the other way around. */
        position: relative;
        z-index: 1;
      }

      /* The editor's top bar, the same height as the topbar so the header
         divider runs continuously across the window: the open-file tabs on
         the left, the whole-panel toggle hugging the right edge (matching
         the topbar's toggle position, so it stays put as the panel
         opens/closes). Always rendered — the editor's child order is
         structural (see panel_view). */
      .editor-tabsbar {
        display: flex;
        align-items: center;
        gap: 10px;
        flex: 0 0 auto;
        height: 46px;
        padding: 0 18px 0 12px;
        border-bottom: 1px solid var(--line);
        background: var(--surface);
      }

      /* The tabs scroll horizontally rather than wrapping; the scrollbar is
         hidden — the chips themselves make the overflow discoverable. */
      .editor-tabs {
        display: flex;
        align-items: center;
        gap: 4px;
        flex: 1 1 auto;
        min-width: 0;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .editor-tabs::-webkit-scrollbar {
        display: none;
      }

      /* One open file, styled like the app's other selectable chips
         (tree rows, panel toggles): a quiet rounded chip, accent-tinted
         when active. */
      .editor-tab {
        display: flex;
        align-items: center;
        gap: 2px;
        flex: 0 0 auto;
        max-width: 200px;
        padding: 4px 4px 4px 10px;
        font-size: 12px;
        color: var(--ink-2);
        border-radius: var(--radius-sm);
        cursor: pointer;
        white-space: nowrap;
      }
      .editor-tab:hover {
        background: var(--surface-2);
        color: var(--ink);
      }
      .editor-tab.active {
        background: var(--accent-soft);
        color: var(--accent-ink);
      }
      /* A tab whose file vanished from disk keeps its place, struck through
         until the file reappears or the tab is closed. */
      .editor-tab.deleted .tab-name {
        text-decoration: line-through;
        color: var(--ink-3);
      }
      .tab-name {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tab-close {
        flex: 0 0 auto;
        display: grid;
        place-items: center;
        width: 16px;
        height: 16px;
        padding: 0;
        border: none;
        border-radius: 4px;
        background: transparent;
        color: var(--ink-3);
        font-size: 12px;
        line-height: 1;
        cursor: pointer;
      }
      .editor-tab .tab-close:hover {
        background: color-mix(in srgb, var(--ink) 12%, transparent);
        color: var(--ink);
      }
      .editor-tab.active .tab-close {
        color: var(--accent-ink);
      }

      /* The viewer and the toggleable file-tree panel split the column below
         the breadcrumb, Emacs-style: the tree docks flat along the bottom
         and takes real layout height, the viewer keeps the rest. Both stay
         mounted (see panel_view) so the viewer host is never re-keyed and
         the filter's state survives toggling; CSS alone hides the panel. */
      .editor-body {
        display: flex;
        flex-direction: column;
        flex: 1 1 auto;
        min-width: 0;
        min-height: 0;
      }

      /* The viewer plus its notice overlay. The overlay covers the viewer
         while the active tab has no document (deleted / binary / oversized
         file) — panel chrome, not a synthesized source document. */
      .viewer-stack {
        position: relative;
        display: flex;
        flex: 1 1 auto;
        min-width: 0;
        min-height: 0;
      }
      .viewer-stack > .viewer-host {
        flex: 1 1 auto;
      }
      .viewer-notice {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
        font-size: 13px;
        color: var(--ink-2);
        background: var(--surface);
      }
      .viewer-notice.hidden {
        display: none;
      }
      /* The file tree as a flat bottom panel, Emacs-window style: full
         width, a 1px seam against the viewer, no chrome of its own, shown
         and hidden instantly. Non-modal — the viewer above stays live.
         The height is `--tree-height`, set as the user drags the handle on
         the top seam (see tree_resize.mbt); it defaults to a third and is
         clamped so the panel floors at 96px while the viewer keeps at
         least 120px. The clamp also re-fits the panel on window resize
         without any script. */
      .file-tree-pane {
        position: relative;
        display: flex;
        flex-direction: column;
        flex: 0 0 clamp(96px, var(--tree-height, 32%), calc(100% - 120px));
        min-height: 0;
        overflow: hidden;
        border-top: 1px solid var(--line);
        background: var(--surface);
      }
      .editor:not(.tree-open) .file-tree-pane {
        display: none;
      }

      /* The right-sidebar layout (a Settings choice): same DOM, the body
         flexes as a row and the tree becomes a column on the viewer's
         right. The width is `--tree-width`, set by the same drag handle
         (now on the pane's left seam), clamped so the tree floors at 180px
         while the viewer keeps at least 240px. */
      .editor.tree-right .editor-body {
        flex-direction: row;
      }
      .editor.tree-right .file-tree-pane {
        flex: 0 0 clamp(180px, var(--tree-width, 260px), calc(100% - 240px));
        min-width: 0;
        border-top: none;
        border-left: 1px solid var(--line);
      }

      /* Drag-to-resize handle on the panel's viewer-facing seam — the
         row-resize twin of .editor-resize-handle in the bottom layout, a
         col-resize strip on the left seam in the sidebar layout. */
      .tree-resize-handle {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 5px;
        z-index: 2;
        cursor: row-resize;
      }
      .editor.tree-right .tree-resize-handle {
        right: auto;
        bottom: 0;
        width: 5px;
        height: auto;
        cursor: col-resize;
      }
      .tree-resize-handle:hover,
      html.is-resizing-row .tree-resize-handle,
      html.is-resizing-col .tree-resize-handle {
        background: var(--accent-soft);
      }
      html.is-resizing-row {
        cursor: row-resize;
      }
      html.is-resizing-col {
        cursor: col-resize;
      }
      html.is-resizing-row *,
      html.is-resizing-col * {
        user-select: none !important;
      }
      .file-panel-error.empty {
        display: none;
      }

      /* Drag-to-resize handle on the editor's left edge. A thin strip floated
         above the seam (z-index over the viewer) with a col-resize cursor; it
         tints on hover and while dragging. Hidden when the panel is closed (the
         editor column is then zero-width). */
      .editor-resize-handle {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        width: 6px;
        z-index: 3;
        cursor: col-resize;
      }
      .editor-resize-handle:hover,
      html.is-resizing .editor-resize-handle {
        background: var(--accent-soft);
      }
      .content:not(.panel-open) .editor-resize-handle {
        display: none;
      }
      /* While dragging, keep the resize cursor everywhere and stop the drag from
         selecting text under the pointer. */
      html.is-resizing {
        cursor: col-resize;
      }
      html.is-resizing * {
        user-select: none !important;
      }

      /* The filter line rides the panel's bottom edge like an Emacs
         minibuffer: one flat row, a hairline above it, a borderless input. */
      .file-tree-header {
        display: flex;
        align-items: center;
        flex: 0 0 auto;
        height: 32px;
        padding: 0 4px;
        border-top: 1px solid var(--line);
      }

      .file-filter {
        flex: 1 1 auto;
        width: auto;
        min-width: 0;
        padding: 4px 8px;
        font-size: 12px;
        border: 0;
        background: transparent;
        color: var(--ink);
      }
      .file-filter:focus {
        outline: none;
      }

      .file-panel-error {
        flex: 0 0 auto;
        padding: 8px 12px;
        font-size: 12px;
        color: var(--danger, #c0392b);
        background: var(--surface-2);
      }

      .file-tree {
        flex: 1 1 auto;
        min-height: 0;
        overflow: auto;
        padding: 4px 0 8px;
      }

      .file-panel-empty {
        padding: 12px;
        font-size: 12px;
        color: var(--ink-2);
      }

      .tree-row {
        display: flex;
        align-items: center;
        gap: 4px;
        padding-top: 3px;
        padding-bottom: 3px;
        padding-right: 10px;
        font-size: 13px;
        color: var(--ink);
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        transition: background-color 1.2s ease;
      }

      .tree-row:hover {
        background: var(--surface-2);
      }

      .tree-row.selected {
        background: var(--accent-soft);
        color: var(--accent-ink);
      }

      /* The keyboard cursor's row (↑/↓ from the filter input) — the hover
         tint, held. */
      .tree-row.cursor {
        background: var(--surface-2);
      }
      .tree-row.selected.cursor {
        background: var(--accent-soft);
        outline: 1px solid var(--accent-ink);
        outline-offset: -1px;
      }

      /* A breadcrumb's `RevealDirectory` target, flashed until
         `HighlightCleared` removes the class; the transition above eases it
         back out. */
      .tree-row.highlighted {
        background: var(--accent-soft);
      }

      .tree-chevron {
        flex: 0 0 auto;
        width: 12px;
        color: var(--ink-2);
        font-size: 10px;
      }

      .tree-dir .tree-name {
        font-weight: 600;
      }

      .tree-name {
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* A fuzzy-filter match row: the whole relative path, dimmed so the
         highlighted query characters carry the row. */
      .tree-path {
        color: var(--ink-2);
      }

      /* The query characters inside a match. */
      .tree-hit {
        color: var(--accent-ink);
        font-weight: 600;
      }

      /* The slimmer second row under the tab bar: the active file's path,
         with the tree-pane toggle at the right edge — the same padding as
         the tab bar above, so it sits directly under the panel toggle.
         Hidden while no file is open (the tree then shows unconditionally);
         it stays in the DOM so the editor's child order never re-keys the
         viewer host. */
      .viewer-breadcrumb.hidden {
        display: none;
      }
      .viewer-breadcrumb {
        display: flex;
        align-items: center;
        gap: 6px;
        flex: 0 0 auto;
        height: 34px;
        padding: 0 18px 0 12px;
        border-bottom: 1px solid var(--line);
        font-size: 12px;
        color: var(--ink-3);
        white-space: nowrap;
        overflow: hidden;
      }

      /* The path crumbs grow and ellipsize. */
      .crumb-path {
        display: flex;
        align-items: center;
        gap: 6px;
        flex: 1 1 auto;
        min-width: 0;
        overflow: hidden;
      }

      /* Every crumb but the current one is a `BrowseDir` link. */
      .crumb {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--ink-2);
        cursor: pointer;
      }
      .crumb:hover {
        color: var(--ink);
        text-decoration: underline;
      }
      .crumb-file {
        color: var(--ink);
        font-weight: 500;
        cursor: default;
      }
      .crumb-file:hover {
        text-decoration: none;
      }
      .crumb-sep {
        flex: 0 0 auto;
        color: var(--ink-3);
      }

      .viewer-host {
        /* The embedded viewer positions its layers absolutely; without a
           positioning context here they escape and paint over the chat. It
           fills the viewer pane below the breadcrumb. */
        position: relative;
        flex: 1 1 auto;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
      }

      /* ---------- sidebar ---------- */
      /* The aside carries no horizontal padding of its own: each row (header,
         sections, footer) owns its inset, so the scrolling sessions list can
         run its scrollbar at the sidebar's true edge instead of trapping it
         inside a shared padding box. */
      aside {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 14px;
        min-width: 0;
        min-height: 0;
        padding-bottom: 14px;
        border-right: 1px solid var(--line);
        background: var(--surface);
        color: var(--ink-2);
      }

      /* The sidebar's own 46px header, matching the topbar so the sidebar
         toggle sitting here (while the sidebar is open) lands at the same
         screen position as the topbar's toggle (while it's closed), and the
         bottom divider continues the topbar's across the two columns. */
      .sidebar-header {
        display: flex;
        align-items: center;
        height: 46px;
        padding: 0 18px;
        border-bottom: 1px solid var(--line);
      }

      /* New chat holds the header's right edge. The -4px mirrors the
         toggle's left pull so both icons sit the same optical distance from
         their window edge. */
      .sidebar-header .header-new-chat {
        margin-left: auto;
        margin-right: -4px;
      }

      .sidebar-main {
        display: grid;
        grid-template-rows: minmax(0, 1fr);
        align-content: start;
        min-width: 0;
        min-height: 0;
      }

      .sidebar-section.sessions {
        overflow-y: auto;
        overflow-x: hidden;
        min-height: 0;
        align-content: start;
        /* The scroll box spans to the sidebar's edge; the right inset is the
           reserved scrollbar gutter (9px) plus 3px of clearance — 12px in
           total, matching the other sections whether or not the bar shows. */
        padding-right: 3px;
        scrollbar-gutter: stable;
      }

      .sidebar-section {
        display: grid;
        gap: 4px;
        min-width: 0;
        padding: 0 12px;
      }

      .sidebar-heading {
        padding: 0 8px;
        margin-bottom: 4px;
        color: var(--ink-3);
        font-size: 10.5px;
        font-weight: 500;
        letter-spacing: 0.13em;
        text-transform: uppercase;
        line-height: 20px;
      }

      .conversation-row {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        min-height: 32px;
        padding: 0 8px;
        border-radius: var(--radius-sm);
        color: var(--ink-2);
        font-size: 12.5px;
        cursor: pointer;
      }
      .conversation-row > .sidebar-label {
        flex: 1 1 auto;
      }

      .conversation-row:hover {
        background: var(--surface-2);
      }

      .conversation-row.active {
        background: var(--accent-soft);
        color: var(--accent-ink);
      }

      .conversation-row.error {
        color: var(--del);
        cursor: default;
      }

      /* Hover-revealed archive control on a durable row. Kept in layout
         (visibility, not display) so the label doesn't shift as it appears. */
      .row-archive {
        flex: 0 0 auto;
        display: grid;
        place-items: center;
        width: 20px;
        height: 20px;
        padding: 0;
        border: 0;
        border-radius: var(--radius-sm);
        background: transparent;
        color: var(--ink-3);
        font-size: 12px;
        line-height: 1;
        cursor: pointer;
        visibility: hidden;
      }
      .conversation-row:hover .row-archive {
        visibility: visible;
      }
      .row-archive:hover {
        background: color-mix(in srgb, var(--ink) 10%, transparent);
        color: var(--ink);
      }
      /* A conversation row's trailing slot: the status dot and the archive
         button stack in one fixed-size cell, so the dot sits at the same
         offset whether or not the row is archivable. Hovering a row that
         has an action swaps the dot for it. */
      .row-trailing {
        flex: 0 0 auto;
        display: grid;
        place-items: center;
        width: 20px;
        height: 20px;
      }
      .row-trailing > * {
        grid-area: 1 / 1;
      }
      .conversation-row:hover .row-trailing:has(.row-archive) .run-dot {
        display: none;
      }

      /* The chat list's two section headings ("Workspaces", "Chats"): the
         sidebar-heading type with a hover-revealed ＋ that adds to the
         section, sharing the row-archive treatment. */
      .section-heading {
        display: flex;
        align-items: center;
        gap: 4px;
        margin-bottom: 0;
        border-radius: var(--radius-sm);
      }
      .section-heading:not(:first-child) {
        margin-top: 14px;
      }
      .section-heading > .sidebar-label {
        flex: 1 1 auto;
      }
      .section-heading:hover .row-archive {
        visibility: visible;
      }
      /* A foldable section ("Chats"): the heading toggles it, wearing the
         same textual chevron as the archived group. */
      .section-heading.collapsible {
        cursor: pointer;
        user-select: none;
      }
      .section-heading.collapsible > .sidebar-label::after {
        content: " ▾";
      }
      .section-heading.collapsible.collapsed > .sidebar-label::after {
        content: " ▸";
      }

      /* An attached workspace: a folder row with its conversations nested
         beneath. Not clickable itself — the hover controls do the work —
         and the active workspace (where a plain "New chat" lands) reads as
         the darker label. While a fresh "New chat" is on screen there (no
         sidebar row of its own yet), the workspace row wears the selected
         conversation's accent pill in its place. */
      .workspace-row {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        min-height: 32px;
        padding: 0 8px;
        border-radius: var(--radius-sm);
        color: var(--ink-2);
        font-size: 12.5px;
      }
      .workspace-row > .sidebar-label {
        flex: 1 1 auto;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .workspace-row > .sidebar-icon {
        color: var(--ink-3);
      }
      .workspace-row:hover {
        background: var(--surface-2);
      }
      .workspace-row.active {
        color: var(--ink);
        font-weight: 500;
      }
      .workspace-row.composing {
        background: var(--accent-soft);
        color: var(--accent-ink);
      }
      .workspace-row.composing > .sidebar-icon {
        color: var(--accent-ink);
      }
      .workspace-row:hover .row-archive {
        visibility: visible;
      }

      /* A conversation nested under its workspace row. */
      .conversation-row.nested {
        padding-left: 28px;
      }
      .conversation-row.placeholder {
        color: var(--ink-3);
        cursor: default;
      }
      .conversation-row.placeholder:hover {
        background: transparent;
      }

      /* The manual path input behind "Add workspace", shown only when the
         platform has no system folder chooser. */
      .workspace-add {
        margin-top: 4px;
        padding: 0 2px;
      }
      .workspace-add input {
        width: 100%;
        padding: 5px 8px;
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        background: var(--surface);
        color: var(--ink);
        font: inherit;
        font-size: 12px;
      }
      .workspace-add input:focus {
        outline: none;
        border-color: var(--accent);
      }

      /* The collapsed group holding archived conversations, at the tail of
         the chat list. */
      .sidebar-archived {
        margin-top: 10px;
      }
      .archived-heading {
        cursor: pointer;
        list-style: none;
        user-select: none;
      }
      .archived-heading::-webkit-details-marker {
        display: none;
      }
      .archived-heading::after {
        content: " ▸";
      }
      .sidebar-archived[open] > .archived-heading::after {
        content: " ▾";
      }
      .archived-rows {
        display: grid;
        gap: 4px;
      }
      .archived-rows .conversation-row {
        color: var(--ink-3);
      }

      .sidebar-icon {
        display: grid;
        place-items: center;
        width: 20px;
        color: var(--accent);
        font-size: 14px;
        line-height: 1;
      }

      .sidebar-label {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .sidebar-footer {
        display: grid;
        gap: 8px;
        min-width: 0;
        padding: 0 12px;
      }

      .sidebar-button {
        display: grid;
        grid-template-columns: 20px minmax(0, 1fr);
        align-items: center;
        gap: 8px;
        width: 100%;
        min-width: 0;
        min-height: 34px;
        border: 0;
        border-radius: var(--radius-sm);
        background: transparent;
        color: var(--ink-2);
        padding: 0 8px;
        text-align: left;
        cursor: pointer;
      }

      .sidebar-button .sidebar-icon {
        color: var(--ink-3);
      }

      .sidebar-button.active {
        background: var(--surface-2);
        color: var(--ink);
      }

      button.sidebar-button:not(:disabled):hover {
        background: var(--surface-2);
        color: var(--ink);
      }


      /* ---------- main column ---------- */
      main {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        /* Constrain the single column too: without this it defaults to `auto`
           and sizes to its widest content (a long code line), so the
           transcript would grow past `main`'s track and slide under the files
           panel. minmax(0, …) holds it to the track and lets inner content
           wrap/scroll instead. */
        grid-template-columns: minmax(0, 1fr);
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        background: var(--paper);
      }

      /* ---------- top bar ---------- */
      .topbar {
        display: flex;
        align-items: center;
        gap: 10px;
        height: 46px;
        padding: 0 18px;
        border-bottom: 1px solid var(--line);
        background: var(--surface);
      }

      .topbar-toggle {
        display: grid;
        place-items: center;
        width: 28px;
        height: 28px;
        margin-left: -4px;
        border: 0;
        border-radius: var(--radius-sm);
        background: transparent;
        color: var(--ink-3);
        font-size: 15px;
        line-height: 1;
        cursor: pointer;
      }
      .topbar-toggle:hover {
        background: var(--surface-2);
        color: var(--ink);
      }

      /* The sidebar toggle's fallback on screens without a topbar (Skills,
         Settings): fixed at the exact screen position the sidebar-header
         toggle holds while the sidebar is open (46px header, 18px padding,
         -4px pull), shown only while the sidebar is closed. */
      .page-sidebar-toggle {
        position: fixed;
        top: 9px;
        left: 14px;
        z-index: 5;
        margin-left: 0;
      }

      .topbar-icon {
        color: var(--accent);
        font-size: 14px;
        line-height: 1;
      }

      .topbar-title {
        min-width: 0;
        max-width: 52%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 12.5px;
        color: var(--ink);
      }

      .topbar-workspace {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 11.5px;
        color: var(--ink-3);
      }
      .topbar-workspace .icon {
        width: 12px;
        height: 12px;
        flex: 0 0 auto;
      }

      .run-status {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        margin-left: auto;
        font-size: 11.5px;
        color: var(--ink-3);
        white-space: nowrap;
      }
      .run-status.accent .run-text {
        color: var(--accent-ink);
      }

      .run-text {
        max-width: 280px;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Topbar app launcher: a button at the far right opening a dropdown of
         installed apps that open the active workspace. */
      .launcher {
        position: relative;
        flex: 0 0 auto;
      }
      .launcher-button {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        height: 28px;
        padding: 0 7px;
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        background: var(--surface);
        color: var(--ink-3);
        font-size: 13px;
        line-height: 1;
        cursor: pointer;
      }
      .launcher-button:hover,
      .launcher-button.open {
        background: var(--surface-2);
        color: var(--ink);
      }
      .launcher-button:disabled {
        opacity: 0.4;
        cursor: default;
        background: transparent;
        color: var(--ink-3);
      }
      .launcher-caret {
        font-size: 9px;
      }
      .launcher-backdrop {
        position: fixed;
        inset: 0;
        z-index: 30;
      }
      .launcher-menu {
        position: absolute;
        top: calc(100% + 6px);
        right: 0;
        min-width: 220px;
        max-height: min(70vh, 460px);
        overflow-y: auto;
        padding: 5px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow-pop);
        z-index: 31;
      }
      .launcher-item {
        display: flex;
        align-items: center;
        gap: 11px;
        width: 100%;
        padding: 7px 9px;
        border: 0;
        border-radius: var(--radius-sm);
        background: transparent;
        color: var(--ink);
        font-size: 13px;
        text-align: left;
        cursor: pointer;
      }
      .launcher-item:hover {
        background: var(--accent-soft);
        color: var(--accent-ink);
      }
      .launcher-icon {
        flex: 0 0 auto;
        width: 24px;
        height: 24px;
        border-radius: 6px;
        object-fit: contain;
      }
      .launcher-icon.letter {
        display: grid;
        place-items: center;
        background: var(--surface-2);
        color: var(--ink-3);
        font-size: 12px;
        font-weight: 600;
      }
      .launcher-name {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .launcher-empty {
        padding: 9px 10px;
        color: var(--ink-3);
        font-size: 12.5px;
      }
      .launcher-empty.danger {
        color: var(--del);
      }

      .run-dot {
        width: 7px;
        height: 7px;
        border-radius: 99px;
        background: var(--ink-3);
        flex: 0 0 auto;
      }
      .run-dot.ok {
        background: var(--add);
      }
      .run-dot.warn {
        background: var(--warn);
      }
      .run-dot.danger {
        background: var(--del);
      }
      .run-dot.accent {
        background: var(--accent);
      }
      .run-dot.pulse {
        animation: pulseDot 1.6s ease-out infinite;
      }

      /* ---------- transcript ---------- */
      .transcript {
        min-height: 0;
        overflow: auto;
        padding: 24px 24px 22px;
        background: transparent;
      }

      .stream {
        display: grid;
        /* A bare `auto` column takes its minimum from content, so one wide
           <pre> or long token would blow the track past max-width and shove
           the message off the right. minmax(0, …) lets it shrink so the
           pre's own `overflow: auto` scrolls and plain text wraps instead. */
        grid-template-columns: minmax(0, 1fr);
        gap: 20px;
        max-width: 820px;
        margin: 0 auto;
      }

      /* Floating "jump to latest" over the transcript's bottom edge, shown
         only while auto-follow is unpinned. Sticky inside the scroller; zero
         height so it never adds scroll length, the transform lifts the button
         into view. */
      .jump-latest-wrap {
        position: sticky;
        bottom: 0;
        display: flex;
        justify-content: center;
        height: 0;
        overflow: visible;
        z-index: 5;
      }
      .jump-latest {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        transform: translateY(-42px);
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface);
        color: var(--ink-2);
        font-size: 15px;
        line-height: 1;
        cursor: pointer;
        box-shadow: var(--shadow-pop);
      }
      .jump-latest:hover {
        background: var(--accent-soft);
        color: var(--accent-ink);
        border-color: var(--accent-line);
      }

      /* empty state */
      .empty {
        display: grid;
        justify-items: center;
        align-content: center;
        gap: 14px;
        min-height: 46vh;
        text-align: center;
        padding: 32px 12px;
      }
      .empty-badge {
        display: grid;
        place-items: center;
        width: 52px;
        height: 52px;
        border-radius: var(--radius-lg);
        background: var(--accent-soft);
        border: 1px solid var(--accent-line);
        color: var(--accent);
        font-size: 24px;
        line-height: 1;
      }
      .empty-title {
        font-size: 16px;
        color: var(--ink);
      }
      .empty-sub {
        max-width: 400px;
        color: var(--ink-3);
        font-size: 12.5px;
        line-height: 1.6;
      }

      /* messages */
      .msg {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        min-width: 0;
        animation: riseIn 0.34s cubic-bezier(0.2, 0.7, 0.2, 1) both;
      }

      .avatar {
        display: grid;
        place-items: center;
        width: 26px;
        height: 26px;
        flex: 0 0 auto;
        border-radius: 7px;
        font-size: 14px;
        line-height: 1;
      }
      .avatar.user {
        background: var(--surface-2);
        border: 1px solid var(--line);
        color: var(--ink-2);
      }
      .avatar.agent {
        background: var(--accent-soft);
        border: 1px solid var(--accent-line);
        color: var(--accent);
      }

      .msg-body {
        flex: 1;
        min-width: 0;
        padding-top: 2px;
      }

      .msg-role {
        margin-bottom: 5px;
        color: var(--ink-3);
        font-size: 10.5px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .msg-content {
        /* Let the content box shrink so a wide child (a <pre>) scrolls
           internally rather than widening the message. */
        min-width: 0;
        color: var(--ink);
        font-size: 13.5px;
        line-height: 1.62;
        overflow-wrap: anywhere;
        white-space: pre-wrap;
      }

      .msg-content.danger {
        border-left: 2px solid var(--del);
        border-radius: 4px;
        background: var(--del-bg);
        padding: 8px 12px;
      }

      /* markdown-rendered assistant content: block elements own the spacing,
         so the pre-wrap used for plain text would double every newline */
      .msg-content.markdown {
        white-space: normal;
      }
      .msg-content.markdown > :first-child {
        margin-top: 0;
      }
      .msg-content.markdown > :last-child {
        margin-bottom: 0;
      }
      .msg-content.markdown p {
        margin: 0.55em 0;
      }
      .msg-content.markdown h1,
      .msg-content.markdown h2,
      .msg-content.markdown h3,
      .msg-content.markdown h4,
      .msg-content.markdown h5,
      .msg-content.markdown h6 {
        margin: 0.95em 0 0.45em;
        line-height: 1.35;
        font-weight: 600;
      }
      .msg-content.markdown h1 {
        font-size: 1.3em;
      }
      .msg-content.markdown h2 {
        font-size: 1.18em;
      }
      .msg-content.markdown h3 {
        font-size: 1.08em;
      }
      .msg-content.markdown h4,
      .msg-content.markdown h5,
      .msg-content.markdown h6 {
        font-size: 1em;
      }
      .msg-content.markdown ul,
      .msg-content.markdown ol {
        margin: 0.45em 0;
        padding-left: 1.5em;
      }
      .msg-content.markdown li {
        margin: 0.2em 0;
      }
      .msg-content.markdown ul.tight p,
      .msg-content.markdown ol.tight p {
        margin: 0;
      }
      .msg-content.markdown pre {
        margin: 0.55em 0;
        padding: 10px 13px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        background: var(--surface);
        color: var(--code);
        font-size: 12px;
        line-height: 1.55;
        white-space: pre;
      }
      .msg-content.markdown pre code {
        padding: 0;
        border: none;
        background: none;
        font-size: inherit;
      }
      /* Plain-text fallback when the markdown parser rejects an input. */
      .msg-content.markdown pre.markdown-fallback {
        margin: 0;
        padding: 0;
        border: 0;
        background: transparent;
        font: inherit;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .msg-content.markdown pre.raw-html {
        color: var(--ink-3);
        white-space: pre-wrap;
      }
      .msg-content.markdown blockquote {
        margin: 0.55em 0;
        padding: 2px 12px;
        border-left: 3px solid var(--line-2);
        color: var(--ink-2);
      }
      .msg-content.markdown table {
        /* Scroll a wide table horizontally inside the message (like a code
           block) rather than letting it widen or get clipped: display:block +
           max-content lets overflow-x engage while max-width keeps it in
           column. */
        display: block;
        width: max-content;
        max-width: 100%;
        overflow-x: auto;
        margin: 0.55em 0;
        border-collapse: collapse;
        font-size: 12.5px;
      }
      .msg-content.markdown th,
      .msg-content.markdown td {
        padding: 4px 10px;
        border: 1px solid var(--line);
      }
      .msg-content.markdown th {
        background: var(--surface-2);
        font-weight: 600;
      }
      .msg-content.markdown hr {
        margin: 0.9em 0;
        border: none;
        border-top: 1px solid var(--line);
      }
      .msg-content.markdown a {
        color: var(--accent);
      }
      .msg-content.markdown img {
        max-width: 100%;
      }
      .msg-content.markdown .footnote {
        margin: 0.45em 0;
        color: var(--ink-3);
        font-size: 12px;
      }
      .msg-content.markdown .footnote-label {
        margin-right: 6px;
        color: var(--ink-2);
      }

      /* live streaming bubble: a blinking caret after the latest text */
      .msg.streaming .msg-content::after {
        content: "▍";
        margin-left: 2px;
        color: var(--accent);
        animation: caretBlink 1s steps(1) infinite;
      }

      @keyframes caretBlink {
        50% {
          opacity: 0;
        }
      }


      .inline-code {
        border-radius: 4px;
        background: var(--surface-2);
        color: var(--accent-ink);
        border: 1px solid var(--line-2);
        padding: 0.08em 0.34em;
        font-size: 0.92em;
        overflow-wrap: anywhere;
      }

      /* A clickable file reference in transcript text. It is a <button> (the
         only inline element that carries a click here), stripped of button
         chrome so it reads as a link, or as accented inline code when it wraps
         a code span. */
      .file-link {
        display: inline;
        margin: 0;
        padding: 0;
        border: none;
        background: none;
        font: inherit;
        text-align: left;
        color: var(--accent);
        cursor: pointer;
        vertical-align: baseline;
      }
      .file-link:hover,
      .file-link:focus-visible {
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      .file-link .inline-code {
        color: var(--accent);
        border-color: var(--accent);
        text-decoration: none;
      }
      .file-link:hover .inline-code,
      .file-link:focus-visible .inline-code {
        background: var(--accent);
        color: var(--bg, #fff);
      }

      /* One turn's work (thinking + tool calls), indented under the agent
         avatar and folded behind a single summary line. Borderless on
         purpose: the work log is typography, not chrome — prose for
         reasoning, gray one-liners for tool calls. */
      .activity-row {
        padding-left: 38px;
        min-width: 0;
        animation: riseIn 0.34s cubic-bezier(0.2, 0.7, 0.2, 1) both;
      }

      .activity-summary,
      .tool-line-summary,
      .tool-call-summary {
        cursor: pointer;
        list-style: none;
        user-select: none;
      }
      .activity-summary::-webkit-details-marker,
      .tool-line-summary::-webkit-details-marker,
      .tool-call-summary::-webkit-details-marker {
        display: none;
      }

      .activity-summary {
        display: flex;
        align-items: baseline;
        gap: 10px;
        color: var(--ink-3);
        font-size: 12px;
        letter-spacing: 0.02em;
      }
      .activity-summary:hover {
        color: var(--ink-2);
      }
      .activity-text {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .activity-text::after {
        content: " ▸";
      }
      .activity[open] > .activity-summary .activity-text::after {
        content: " ▾";
      }
      .activity-failed {
        flex: 0 0 auto;
        color: var(--del);
        font-size: 11px;
      }

      .activity-body {
        display: grid;
        gap: 14px;
        padding: 12px 0 4px;
      }

      /* compaction checkpoint between turns: a quiet labeled fold with the
         summary prose behind it */
      .summary-card-label {
        cursor: pointer;
        list-style: none;
        user-select: none;
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--ink-3);
        font-size: 12px;
        letter-spacing: 0.02em;
      }
      .summary-card-label::-webkit-details-marker {
        display: none;
      }
      .summary-card-label:hover {
        color: var(--ink-2);
      }
      .summary-card-icon {
        flex: none;
        display: inline-flex;
        align-items: center;
      }
      .summary-card-icon .icon {
        width: 14px;
        height: 14px;
      }
      .summary-card-text::after {
        content: " ▸";
      }
      .summary-card[open] > .summary-card-label .summary-card-text::after {
        content: " ▾";
      }
      .summary-card-body {
        padding: 10px 0 4px;
        font-size: 13px;
        color: var(--ink-2);
      }

      /* Reasoning inside the work log — and the live stream before it commits
         (`reasoning_view`): full-width muted prose, never a labelled
         "Thinking" row of its own. */
      .activity-thinking {
        color: var(--ink-2);
        font-size: 13px;
      }

      /* Interim assistant narration folded into the work log: real messages,
         so normal ink — just sized down to the log's scale. */
      .activity-response {
        font-size: 13px;
      }

      /* A burst of consecutive tool calls: a gray one-line summary that
         expands to the per-call briefs. */
      .tool-line-summary {
        display: flex;
        align-items: baseline;
        gap: 10px;
        color: var(--ink-3);
        font-size: 12.5px;
      }
      .tool-line-summary:hover {
        color: var(--ink-2);
      }
      .tool-line-text::after {
        content: " ▸";
      }
      .tool-line[open] > .tool-line-summary .tool-line-text::after {
        content: " ▾";
      }
      .tool-line-body {
        display: grid;
        gap: 4px;
        padding: 6px 0 2px 16px;
      }

      /* One call inside a burst: its brief, expandable to the output. */
      .tool-call-label,
      .tool-call-summary {
        color: var(--ink-3);
        font-size: 12.5px;
      }
      .tool-call-summary:hover {
        color: var(--ink-2);
      }
      .tool-call-label.error,
      .tool-call.error > .tool-call-summary {
        color: var(--del);
      }

      /* Output grows the page instead of scrolling in place: the transcript
         stays the only scroll area, so the wheel is never trapped by a
         nested scrollbar. Long dumps are clamped in the renderer. */
      .tool-call pre {
        margin: 6px 0 8px;
        padding: 10px 12px;
        border-radius: var(--radius-sm);
        background: var(--surface-2);
        color: var(--code);
        font-size: 12px;
        line-height: 1.55;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      .tool-call.error pre {
        background: var(--del-bg);
      }

      /* ---------- composer ---------- */
      .composer {
        border-top: 1px solid var(--line);
        background: var(--paper);
        padding: 16px 24px 18px;
      }

      .composer-inner {
        position: relative;
        display: grid;
        gap: 8px;
        max-width: 820px;
        margin: 0 auto;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        padding: 8px 10px;
        box-shadow: var(--shadow);
      }

      /* mention chips ($ skills, # symbols) above the textarea; the tray is
         always in the DOM and collapses to nothing when there are no chips */
      .mention-tray {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .mention-tray:empty {
        display: none;
      }
      .mention-chip {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        max-width: 260px;
        padding: 2px 4px 2px 8px;
        border: 1px solid var(--accent-line);
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent-ink);
        font-size: 12px;
      }
      /* Wraps the glyph+label: a plain span for a chip with no jump target, or
         a reset `<button>` (same layout) for one that opens the editor panel
         at a resolved location. */
      .mention-body,
      .mention-jump {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-width: 0;
      }
      .mention-jump {
        border: none;
        background: transparent;
        padding: 0;
        margin: 0;
        color: inherit;
        font: inherit;
        cursor: pointer;
      }
      .mention-jump:hover .mention-label {
        text-decoration: underline;
      }
      .mention-glyph {
        flex: none;
        font-family: var(--mono);
        font-weight: 600;
        opacity: 0.75;
      }
      .mention-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-family: var(--mono);
      }
      .mention-remove {
        flex: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        padding: 0;
        border: none;
        border-radius: 999px;
        background: transparent;
        color: var(--accent-ink);
        font-size: 13px;
        line-height: 1;
        cursor: pointer;
      }
      .mention-remove:hover {
        background: color-mix(in srgb, var(--accent) 22%, transparent);
      }
      /* chips re-rendered inside a sent message (parsed back out of its
         <user_mentions> envelope): same chip chrome, no remove button, so the
         padding evens out; a small gap before the typed text below */
      .msg-body .mention-tray {
        margin: 2px 0 4px;
      }
      .msg-body .mention-chip {
        padding: 2px 8px;
      }

      /* slash/skill completion menu, floated above the composer */
      .completion-menu {
        position: absolute;
        left: 0;
        right: 0;
        bottom: calc(100% + 8px);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow-pop);
        overflow: hidden;
        z-index: 20;
      }
      .completion-hint {
        padding: 6px 12px;
        border-bottom: 1px solid var(--line-2);
        color: var(--ink-3);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .completion-list {
        max-height: 240px;
        overflow-y: auto;
        padding: 4px;
      }
      .completion-item {
        display: flex;
        align-items: baseline;
        gap: 10px;
        padding: 7px 10px;
        border-radius: var(--radius-sm);
        cursor: pointer;
      }
      .completion-item.selected {
        background: var(--accent-soft);
      }
      .completion-label {
        flex: none;
        color: var(--ink);
        font-family: var(--mono);
        font-size: 12.5px;
      }
      .completion-item.selected .completion-label {
        color: var(--accent-ink);
      }
      .completion-detail {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--ink-3);
        font-size: 12px;
      }
      /* state line for a # menu whose results are still loading or empty */
      .completion-empty {
        padding: 7px 10px;
        color: var(--ink-3);
        font-size: 12px;
      }

      /* transient notice docked above the composer (e.g. compaction) */
      .composer-notice {
        display: flex;
        align-items: center;
        gap: 8px;
        max-width: 820px;
        margin: 0 auto 8px;
        padding: 6px 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface-2);
        color: var(--ink-2);
        font-size: 12.5px;
      }
      .composer-notice-icon {
        flex: none;
        display: inline-flex;
        align-items: center;
      }

      /* steering input not yet folded into the running turn: a panel docked
         above the composer until the engine settles it */
      .pending-steers {
        max-width: 820px;
        margin: 0 auto 8px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface-2);
        padding: 4px 10px;
      }
      .pending-steer-row {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        padding: 4px 0;
        color: var(--ink-2);
        font-size: 12.5px;
        line-height: 1.5;
      }
      .pending-steer-row + .pending-steer-row {
        border-top: 1px solid var(--line-2);
      }
      .pending-steer-icon {
        color: var(--accent);
        flex: none;
      }
      .pending-steer-text {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .pending-steer-state {
        flex: none;
        color: var(--ink-3);
        font-size: 11px;
        animation: caretBlink 1.4s steps(1) infinite;
      }

      .composer textarea {
        min-height: 26px;
        max-height: 180px;
        border: 0;
        background: transparent;
        padding: 6px 6px 2px;
        resize: none;
        color: var(--ink);
        font-size: 13.5px;
        line-height: 1.6;
      }
      .composer textarea:focus {
        outline: 0;
      }
      .composer textarea::placeholder {
        color: var(--ink-3);
      }

      .composer-toolbar {
        display: flex;
        align-items: center;
        padding-top: 8px;
        border-top: 1px solid var(--line-2);
      }

      .composer-controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        width: 100%;
        min-width: 0;
      }

      /* The toolbar's left status group: the model chip plus the workspace's
         git branch (which lives here, not in the topbar). */
      .composer-status {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .composer-branch {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 11.5px;
        color: var(--ink-3);
      }
      .composer-branch::before {
        content: "⎇";
        font-size: 12px;
      }

      .composer-model {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        max-width: 260px;
        min-width: 0;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        padding: 4px 9px;
        color: var(--ink-2);
        font-size: 11.5px;
        line-height: 1.4;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .composer-model::before {
        content: "✦";
        color: var(--accent);
      }

      .icon-button {
        display: grid;
        place-items: center;
        width: 30px;
        min-width: 30px;
        height: 30px;
        border: 1px solid transparent;
        border-radius: 7px;
        background: transparent;
        color: var(--ink-2);
        padding: 0;
        font-size: 16px;
        line-height: 1;
        cursor: pointer;
      }
      .icon-button:not(:disabled):hover {
        background: var(--surface-2);
      }

      .send-button {
        border-color: transparent;
        background: var(--accent);
        color: #fff;
      }
      .send-button:not(:disabled):hover {
        background: var(--accent-ink);
      }
      .send-button:disabled {
        background: var(--surface-2);
        color: var(--ink-3);
      }

      .stop-button {
        border-color: var(--del-line);
        background: var(--del-bg);
        color: var(--del);
        font-size: 13px;
      }
      .stop-button:not(:disabled):hover {
        background: color-mix(in srgb, var(--del-bg) 78%, var(--del));
      }

      /* ---------- generic buttons ---------- */
      button {
        border: 1px solid transparent;
        border-radius: var(--radius-sm);
        background: transparent;
        color: var(--ink);
        cursor: pointer;
      }
      button:disabled {
        cursor: default;
        opacity: 0.5;
      }

      button.secondary {
        border-color: var(--line);
        background: var(--surface);
        color: var(--ink);
        padding: 6px 12px;
        font-size: 12px;
      }
      button.secondary:not(:disabled):hover {
        background: var(--surface-2);
      }

      /* The accent-filled call to action, button.secondary's counterpart:
         Save API key, the self-update controls, modal confirms. As a
         sidebar-button it keeps the sidebar's geometry, only the fill. */
      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }
      button.primary:not(.sidebar-button) {
        padding: 6px 12px;
        font-size: 12px;
      }
      button.primary .sidebar-icon {
        color: #fff;
      }
      button.primary:not(:disabled):hover {
        background: var(--accent-ink);
        border-color: var(--accent-ink);
        color: #fff;
      }
      button.primary:disabled {
        opacity: 0.7;
        cursor: default;
      }

      /* ---------- settings page ---------- */
      /* Shares the Skills page's shell — same column width, header type, and
         section headings — so the two pages read as siblings. */
      .settings-page {
        grid-row: 1 / -1;
        min-height: 0;
        overflow: auto;
        padding: 40px 28px 28px;
      }

      .settings-page-inner {
        display: grid;
        align-content: start;
        gap: 18px;
        max-width: 720px;
        margin: 0 auto;
      }

      .settings-header {
        display: grid;
        gap: 6px;
        margin-bottom: 6px;
      }

      .settings-header h1 {
        font-size: 22px;
        letter-spacing: -0.02em;
      }

      h1,
      h2 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        line-height: 1.3;
      }

      .settings-subtitle {
        color: var(--ink-3);
        font-size: 13px;
      }

      .settings {
        display: grid;
        align-content: start;
        gap: 20px;
      }

      .settings-group {
        display: grid;
        gap: 4px;
      }

      .settings-group-title {
        color: var(--ink-3);
        font-size: 10.5px;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 2px;
      }

      .setting-row {
        display: flex;
        gap: 14px;
        align-items: center;
        justify-content: space-between;
        padding: 9px 2px;
        border-radius: var(--radius-sm);
      }

      .setting-row:hover {
        background: var(--surface-2);
      }

      .setting-row.stack {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }

      .setting-text {
        flex: 1;
        display: grid;
        gap: 3px;
        min-width: 0;
      }

      .setting-name {
        font-size: 13px;
        font-weight: 600;
      }

      .setting-desc {
        color: var(--ink-2);
        font-size: 12px;
      }

      /* A row's controls sit on one line, hugging the right edge; a lone
         select/input still fills the column via its own width: 100%. */
      .setting-control {
        flex-shrink: 0;
        width: 280px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        flex-wrap: wrap;
        gap: 8px;
      }

      .setting-row.stack .setting-control {
        width: auto;
        flex-direction: column;
        align-items: stretch;
      }

      #saveApiKey {
        align-self: flex-end;
      }

      input,
      textarea,
      select {
        width: 100%;
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        background: var(--surface-2);
        color: var(--ink);
        padding: 9px 10px;
        font-size: 13px;
        letter-spacing: -0.01em;
      }

      input:focus,
      textarea:focus,
      select:focus {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }

      /* ---------- skills page ---------- */
      .skills-page {
        grid-row: 1 / -1;
        min-height: 0;
        overflow: auto;
        padding: 40px 28px 28px;
      }

      .skills-page-inner {
        display: grid;
        align-content: start;
        gap: 12px;
        max-width: 720px;
        margin: 0 auto;
      }

      .skills-header {
        display: grid;
        gap: 6px;
        margin-bottom: 6px;
      }

      .skills-header h1 {
        font-size: 22px;
        letter-spacing: -0.02em;
      }

      .skills-subtitle {
        color: var(--ink-3);
        font-size: 13px;
      }

      .skills-search {
        padding: 10px 12px;
        margin-bottom: 8px;
      }

      .skill-check {
        font-size: 12px;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .skill-avatar {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        flex-shrink: 0;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface-2);
        color: var(--ink-3);
        font-size: 15px;
      }

      .skills-heading {
        color: var(--ink-3);
        font-size: 10.5px;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-top: 6px;
      }

      .skill-row {
        display: flex;
        gap: 14px;
        align-items: center;
        padding: 9px 2px;
        border-radius: var(--radius-sm);
      }

      .skill-row:hover {
        background: var(--surface-2);
      }

      .skill-info {
        display: grid;
        gap: 3px;
        min-width: 0;
        flex: 1;
      }

      .skill-name {
        font-size: 13px;
        font-weight: 600;
        overflow-wrap: anywhere;
      }

      .skill-desc {
        color: var(--ink-2);
        font-size: 12px;
      }

      .skill-meta {
        color: var(--ink-3);
        font-size: 11px;
      }

      .skill-action {
        white-space: nowrap;
        flex-shrink: 0;
      }

      .skills-empty,
      .skills-notice {
        color: var(--ink-3);
        font-size: 12px;
      }

      .pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 3px 9px;
        background: var(--surface-2);
        color: var(--ink-2);
        font-size: 11px;
        white-space: nowrap;
      }

      .ok {
        color: var(--add);
      }
      .warn {
        color: var(--warn);
      }
      .danger {
        color: var(--del);
      }

      /* ---------- notifications ---------- */
      /* Transient error toasts, stacked in whichever window corner Settings
         picked. The stack floats over everything and is only rendered while
         something is up, so it never eats clicks meant for the app. */
      .notifications {
        position: fixed;
        z-index: 40;
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-width: min(380px, calc(100vw - 32px));
      }
      .notifications.corner-bottom-right {
        right: 16px;
        bottom: 16px;
        align-items: flex-end;
      }
      .notifications.corner-bottom-left {
        left: 16px;
        bottom: 16px;
        align-items: flex-start;
      }
      .notifications.corner-top-right {
        right: 16px;
        top: 16px;
        align-items: flex-end;
      }
      .notifications.corner-top-left {
        left: 16px;
        top: 16px;
        align-items: flex-start;
      }
      .notification {
        cursor: pointer;
        padding: 10px 14px;
        border: 1px solid var(--del-line);
        border-radius: var(--radius);
        background: var(--del-bg);
        color: var(--del);
        box-shadow: var(--shadow-pop);
        font-size: 12.5px;
        line-height: 1.5;
        overflow-wrap: anywhere;
        animation: notification-in 160ms ease-out;
      }
      @keyframes notification-in {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      /* ---------- confirmation modal ---------- */
      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 60;
        display: grid;
        place-items: center;
        background: color-mix(in srgb, var(--ink) 24%, transparent);
      }
      .modal {
        width: min(420px, calc(100vw - 48px));
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow-pop);
      }
      .modal-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--ink);
      }
      .modal-body {
        margin-top: 8px;
        font-size: 13px;
        line-height: 1.55;
        color: var(--ink-2);
      }
      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 16px;
      }
      .modal-actions button {
        padding: 6px 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        background: var(--surface);
        color: var(--ink);
        cursor: pointer;
      }
      .modal-actions button:hover {
        background: var(--surface-2);
      }
      /* Re-assert the accent fill: the generic .modal-actions button rule
         above outranks button.primary by document order. */
      .modal-actions button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }
      .modal-actions button.primary:hover {
        background: var(--accent-ink);
        border-color: var(--accent-ink);
      }

      /* Inline outcome text in the Settings updates row. */
      .update-status {
        align-self: center;
        font-size: 12.5px;
        color: var(--ink-2);
      }
      .update-status.update-error {
        color: var(--del);
      }

      @media (max-width: 760px) {
        .app {
          grid-template-columns: 1fr;
          grid-template-rows: auto minmax(0, 1fr);
        }

        aside {
          grid-template-rows: auto;
          border-right: 0;
          border-bottom: 1px solid var(--line);
          max-height: 42vh;
          overflow: auto;
        }

        .topbar-title {
          max-width: 38%;
        }

        .activity-row {
          padding-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="./frontend.js"></script>
  </body>
</html>
